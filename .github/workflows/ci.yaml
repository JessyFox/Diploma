name: Security Pipeline
on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  IMAGE_NAME: "demo-project"

jobs:
  build-scan-push:
    name: Build, scan, and push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build . --file Dockerfile --tag $IMAGE_NAME --label "runnumber=${GITHUB_RUN_ID}"

      - name: Scan repository with Trivy (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore
    
      - name: Upload repo SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-repo-results.sarif
          category: repo-scan

      - name: Scan local image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: sarif
          output: 'trivy-results.sarif'
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: image-scan

      - name: Check for vulnerabilities in both scans
        run: |
          total=0
          for f in trivy-repo-results.sarif trivy-results.sarif; do
            if [ -f "$f" ]; then
              count=$(jq '.runs[0].results | length' "$f")
              total=$((total + count))
            fi
          done
          if [ "$total" -gt 0 ]; then
            exit 1
          fi

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker tag $IMAGE_NAME $IMAGE_ID:latest
          docker push $IMAGE_ID:latest
